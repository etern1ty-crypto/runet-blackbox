name: release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run release:check
      - name: Build package, checksums, and provenance
        run: |
          mkdir -p dist/release
          npm pack --pack-destination dist/release
          (
            cd dist/release
            sha256sum *.tgz > SHA256SUMS.txt
          )
          {
            echo "# Runet Blackbox Release Provenance"
            echo
            echo "- Tag: ${GITHUB_REF_NAME}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Node.js: $(node --version)"
            echo "- npm: $(npm --version)"
            echo "- Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Artifacts are generated by GitHub Actions from the tagged repository state."
          } > dist/release/PROVENANCE.md
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: dist/release/*
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --title "Runet Blackbox ${GITHUB_REF_NAME}" --notes-file dist/release/PROVENANCE.md
          gh release upload "${GITHUB_REF_NAME}" dist/release/* --clobber
