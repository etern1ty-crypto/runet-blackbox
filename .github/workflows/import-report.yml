name: import measurement report

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

concurrency:
  group: import-measurement-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  import:
    if: contains(github.event.issue.labels.*.name, 'measurement') || contains(github.event.issue.title, '[measurement]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Validate project
        run: npm run check
      - name: Import report
        id: import
        continue-on-error: true
        run: node scripts/import-issue.mjs --github-event "$GITHUB_EVENT_PATH" --out data/reports --summary-file import-summary.md --result-file import-result.json
      - name: Rebuild aggregates
        if: steps.import.outcome == 'success'
        run: node scripts/aggregate.mjs
      - name: Commit data changes
        if: steps.import.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reports data/aggregates data/digests
          git diff --cached --quiet || git commit -m "Import measurement report"
          git pull --rebase
          git push
      - name: Comment import result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ ! -s import-summary.md ]; then
            printf '## Runet Blackbox: import did not finish\n\nThe workflow failed before producing a structured import summary. Check the Actions log.\n' > import-summary.md
          fi
          gh issue comment "$ISSUE_NUMBER" --body-file import-summary.md
      - name: Fail rejected import
        if: steps.import.outcome != 'success'
        run: exit 1
