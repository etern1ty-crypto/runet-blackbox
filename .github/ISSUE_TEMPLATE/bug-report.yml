name: Bug report / Ошибка
description: Report a CLI, dashboard, validation, or documentation bug / сообщить об ошибке.
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Описание / Description
      description: Что произошло и чего ты ожидал? What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Команда / Command
      description: Вставь команду, но убери private paths, tokens, cookies и приватные logs.
      render: bash
  - type: textarea
    id: output
    attributes:
      label: Очищенный вывод / Sanitized output
      description: Вставь только sanitized output. Не вставляй packet captures, raw headers, cookies или private URLs.
      render: text
