name: Measurement report
description: Submit a sanitized Runet Blackbox JSON report.
title: "[measurement] <target> from <provider>/<region>"
labels:
  - measurement
body:
  - type: markdown
    attributes:
      value: |
        Run `node cli/bin/runet-blackbox.js check <domain> --json --pretty` and paste the JSON below.

        Do not add IP addresses, exact location, account IDs, private URLs, cookies, headers, packet captures, or logs.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I reviewed the JSON and did not add private notes, credentials, exact location, headers, cookies, packet captures, or logs.
          required: true
        - label: This is a measurement report only, not a request for bypass/proxy/VPN instructions.
          required: true
  - type: textarea
    id: report_json
    attributes:
      label: Report JSON
      description: Paste the full JSON report produced by the CLI.
      render: json
      placeholder: |
        {
          "schema_version": "1.0",
          "target": "example.com"
        }
    validations:
      required: true
