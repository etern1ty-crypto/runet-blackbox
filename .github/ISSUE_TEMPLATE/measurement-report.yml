name: Measurement report / Отчёт измерения
description: Submit a sanitized Runet Blackbox JSON report / отправить очищенный JSON-отчёт.
title: "[measurement] <target> from <provider>/<region>"
labels:
  - measurement
body:
  - type: markdown
    attributes:
      value: |
        Запусти CLI и вставь JSON ниже:

        Самый простой путь:

        `npx runet-blackbox check <domain> --region Moscow --provider <provider> --issue-url`

        Если ссылка слишком большая или ты отправляешь pack:

        `npx runet-blackbox check --pack dev --region Moscow --provider <provider> --issue-file report.issue.md`

        Windows PowerShell:

        `npx runet-blackbox check <domain> --region Moscow --provider <provider> --issue-url`

        English: run the CLI locally and paste the sanitized JSON below. For one target, `--issue-url` can prefill this form.

        Не добавляй IP-адреса, точную локацию, account IDs, private URLs, cookies, headers, packet captures или логи.
        Do not add IP addresses, exact location, account IDs, private URLs, cookies, headers, packet captures, or logs.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation / Подтверждение приватности
      options:
        - label: Я проверил JSON и не добавил private notes, credentials, exact location, headers, cookies, packet captures или logs.
          required: true
        - label: Это только measurement report, не запрос инструкций по bypass/proxy/VPN.
          required: true
        - label: Если VPN/proxy/tun был включён, я явно указал это в контексте отчёта и не называю сеть обычной no-vpn сетью провайдера.
          required: true
  - type: textarea
    id: report_json
    attributes:
      label: Report JSON / JSON отчёта
      description: Вставь полный JSON, созданный CLI. Paste the full JSON report produced by the CLI.
      render: json
      placeholder: |
        {
          "schema_version": "1.0",
          "target": "example.com"
        }
    validations:
      required: true
